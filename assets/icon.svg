<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 橙色渐变 - 咚咚家族风格 -->
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6D00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E65100;stop-opacity:1" />
    </linearGradient>
    
    <!-- 文档阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="512" cy="512" r="480" fill="url(#orangeGradient)"/>
  
  <!-- 文档主体 -->
  <g filter="url(#shadow)">
    <!-- 文档背景 -->
    <path d="M 300 200 L 300 824 L 724 824 L 724 320 L 604 200 Z" 
          fill="white" 
          stroke="none"/>
    
    <!-- 文档折角 -->
    <path d="M 604 200 L 604 320 L 724 320 Z" 
          fill="#E0E0E0" 
          stroke="none"/>
  </g>
  
  <!-- Markdown M 符号 -->
  <g fill="url(#orangeGradient)">
    <!-- 左竖线 -->
    <rect x="360" y="400" width="40" height="280" rx="8"/>
    
    <!-- 左斜线 -->
    <polygon points="400,400 480,540 520,540 440,400"/>
    
    <!-- 右斜线 -->
    <polygon points="440,400 520,540 560,540 480,400"/>
    
    <!-- 右竖线 -->
    <rect x="560" y="400" width="40" height="280" rx="8"/>
  </g>
  
  <!-- 装饰线条 -->
  <g stroke="#FF9800" stroke-width="8" stroke-linecap="round" opacity="0.4">
    <line x1="360" y1="720" x2="500" y2="720"/>
    <line x1="360" y1="760" x2="600" y2="760"/>
  </g>
</svg>